name: Refresh Patent Data

on:
  schedule:
    # Orange Book: monthly (1st of month, 6am UTC)
    - cron: '0 6 1 * *'
  workflow_dispatch:  # allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run pipelines
        env:
          DB_PATH: ./patent-cliff.db
          PATENTSVIEW_API_KEY: ${{ secrets.PATENTSVIEW_API_KEY }}
        run: bun run pipeline:all
      - uses: actions/upload-artifact@v4
        with:
          name: patent-cliff-db-${{ github.run_id }}
          path: patent-cliff.db
          retention-days: 7
